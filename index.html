<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jagdish Chaat Bhandaar - Pro Order & Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background-color: #fff9f5; }
        .food-card { transition: all 0.3s ease; }
        .modal-active { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="pb-40">

    <header class="bg-orange-600 text-white p-8 text-center rounded-b-[4rem] shadow-2xl animate__animated animate__fadeInDown">
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-3 flex items-center justify-center shadow-lg">
            <span class="text-3xl">🥘</span>
        </div>
        <h1 class="text-3xl font-bold tracking-tight">जगदीश चाट भंडार</h1>
        <p class="text-orange-100 text-sm mt-1 italic">Noida's Best Street Food | 10km Delivery</p>
    </header>

    <main class="max-w-md mx-auto p-4 mt-6 space-y-6">
        
        <div class="food-card bg-white rounded-[2.5rem] p-4 shadow-xl shadow-orange-100/50 flex items-center gap-4 border border-orange-50 animate__animated animate__fadeInUp">
            <div class="w-24 h-24 bg-orange-50 rounded-3xl flex items-center justify-center text-4xl">🥯</div>
            <div class="flex-1">
                <h3 class="font-bold text-lg text-slate-800">Gol Gappe (6 Pcs)</h3>
                <p class="text-orange-600 font-black text-xl mt-1">₹40</p>
            </div>
            <button onclick="openCustomizer('Gol Gappe', 40)" class="bg-slate-900 text-white w-12 h-12 rounded-2xl shadow-lg">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

        <div class="food-card bg-white rounded-[2.5rem] p-4 shadow-xl shadow-orange-100/50 flex items-center gap-4 border border-orange-50 animate__animated animate__fadeInUp" style="animation-delay: 0.1s">
            <div class="w-24 h-24 bg-blue-50 rounded-3xl flex items-center justify-center text-4xl">🥣</div>
            <div class="flex-1">
                <h3 class="font-bold text-lg text-slate-800">Dahi Bhalla</h3>
                <p class="text-orange-600 font-black text-xl mt-1">₹60</p>
            </div>
            <button onclick="addToCart('Dahi Bhalla', 60)" class="bg-slate-900 text-white w-12 h-12 rounded-2xl shadow-lg">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

        <div class="food-card bg-white rounded-[2.5rem] p-4 shadow-xl shadow-orange-100/50 flex items-center gap-4 border border-orange-50 animate__animated animate__fadeInUp" style="animation-delay: 0.2s">
            <div class="w-24 h-24 bg-red-50 rounded-3xl flex items-center justify-center text-4xl">🥨</div>
            <div class="flex-1">
                <h3 class="font-bold text-lg text-slate-800">Chaat Papdi</h3>
                <p class="text-orange-600 font-black text-xl mt-1">₹50</p>
            </div>
            <button onclick="addToCart('Chaat Papdi', 50)" class="bg-slate-900 text-white w-12 h-12 rounded-2xl shadow-lg">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

    </main>

    <div id="customModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-8 animate__animated animate__slideInUp">
            <h3 class="text-2xl font-black text-slate-800 mb-6">Customize Gol Gappe</h3>
            <div class="space-y-4 mb-8">
                <label class="flex justify-between items-center p-5 bg-slate-50 rounded-3xl">
                    <span class="font-bold">Dahi Wale Gol Gappe</span>
                    <div class="flex items-center gap-3">
                        <span class="text-orange-600 font-bold">+₹20</span>
                        <input type="checkbox" id="optDahi" class="w-6 h-6 accent-orange-500">
                    </div>
                </label>
                <label class="flex justify-between items-center p-5 bg-slate-50 rounded-3xl">
                    <span class="font-bold">Extra Teekha Paani</span>
                    <div class="flex items-center gap-3">
                        <span class="text-orange-600 font-bold">+₹15</span>
                        <input type="checkbox" id="optPaani" class="w-6 h-6 accent-orange-500">
                    </div>
                </label>
            </div>
            <button onclick="confirmCustomization()" class="w-full bg-orange-600 text-white py-5 rounded-3xl font-bold text-xl shadow-xl">Add to Cart</button>
        </div>
    </div>

    <div id="paymentModal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden z-[200] items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 text-center animate__animated animate__zoomIn">
            <h3 class="text-2xl font-black mb-2">Final Payment</h3>
            <p id="payAmountText" class="text-orange-600 font-black text-3xl mb-4">₹0</p>
            
            <div id="qrcode" class="flex justify-center mb-6 p-4 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 shadow-inner"></div>
            
            <div class="space-y-3">
                <button onclick="openUPI()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg">
                    <i class="fa-solid fa-mobile-screen-button"></i> Pay via UPI App
                </button>
                <button onclick="confirmAndWhatsApp()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg">
                    <i class="fa-brands fa-whatsapp"></i> Payment Done
                </button>
            </div>
            <button onclick="closePayment()" class="mt-6 text-slate-400 font-bold text-xs uppercase tracking-widest">Cancel Order</button>
        </div>
    </div>

    <div id="cartBar" class="fixed bottom-6 left-4 right-4 hidden animate__animated animate__slideInUp">
        <div class="max-w-md mx-auto bg-slate-900 text-white p-6 rounded-[2.5rem] shadow-2xl flex items-center justify-between border-t-4 border-orange-500">
            <div>
                <p id="itemCount" class="text-[10px] font-bold text-orange-400 uppercase tracking-widest">0 Items</p>
                <h4 id="totalPrice" class="text-2xl font-black">₹0</h4>
            </div>
            <button onclick="handlePayment()" class="bg-green-500 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-2 shadow-lg transition-transform active:scale-95">
                PAY & ORDER
            </button>
        </div>
    </div>

    <script>
        let cart = [];
        let total = 0;
        let currentItem = null;

        // --- APNI DETAILS YAHAN BHAREIN ---
        const myUPI = "Q083101167@ybl"; // APNA UPI ID DAALEIN
        const myWhatsApp = "7683022663"; // APNA NO. DAALEIN (With 91)
        const myName = "Jagdish Chaat Bhandaar";

        function openCustomizer(name, basePrice) {
            currentItem = { name, basePrice };
            document.getElementById('customModal').classList.add('modal-active');
        }

        function confirmCustomization() {
            let price = currentItem.basePrice;
            let addOns = [];
            if(document.getElementById('optDahi').checked) { price += 20; addOns.push("Dahi Wale"); }
            if(document.getElementById('optPaani').checked) { price += 15; addOns.push("Extra Paani"); }
            
            const name = addOns.length > 0 ? `${currentItem.name} (${addOns.join("+")})` : currentItem.name;
            addToCart(name, price);
            
            document.getElementById('customModal').classList.remove('modal-active');
            document.getElementById('optDahi').checked = false;
            document.getElementById('optPaani').checked = false;
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            total += price;
            updateUI();
        }

        function updateUI() {
            document.getElementById('cartBar').classList.remove('hidden');
            document.getElementById('itemCount').innerText = `${cart.length} Items Added`;
            document.getElementById('totalPrice').innerText = `₹${total}`;
        }

        function handlePayment() {
            const address = prompt("Delivery ke liye pura address landmark ke sath likhein:");
            if(!address) return;
            window.userAddress = address;

            // Generate UPI Link
            const upiUrl = `upi://pay?pa=${myUPI}&pn=${encodeURIComponent(myName)}&am=${total}&cu=INR`;
            window.currentUpiUrl = upiUrl;

            // Generate QR Code
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: upiUrl, width: 160, height: 160 });
            
            document.getElementById('payAmountText').innerText = `₹${total}`;
            document.getElementById('paymentModal').classList.add('modal-active');
        }

        function openUPI() {
            window.location.href = window.currentUpiUrl;
        }

        function confirmAndWhatsApp() {
            const itemsStr = cart.map(i => i.name).join(", ");
            const msg = `*✅ NEW PAID ORDER - JCB*%0A%0A` +
                        `*Order:* ${itemsStr}%0A` +
                        `*Total Paid:* ₹${total}%0A` +
                        `*Address:* ${window.userAddress}%0A%0A` +
                        `_Lala, payment kar di hai, order bhej do!_`;
            
            window.location.href = `https://wa.me/${myWhatsApp}?text=${msg}`;
        }

        function closePayment() {
            document.getElementById('paymentModal').classList.remove('modal-active');
        }
    </script>
</body>
</html>
