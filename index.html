<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jagdish Chaat Bhandaar - 25 Years of Legacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Kalam:wght@400;700&display=swap');
        :root { --primary: #FF4D00; --secondary: #FFB800; }
        body { font-family: 'Fredoka', sans-serif; background-color: #FFFDFB; color: #2D1B14; }
        .hindi-font { font-family: 'Kalam', cursive; }
        .vibrant-gradient { background: linear-gradient(135deg, #FF4D00 0%, #FF8A00 100%); }
        .modal-active { display: flex !important; animation: fadeIn 0.3s ease; }
        .legacy-gold { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); color: #44340a; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .floating { animation: floating 3s ease-in-out infinite; }
    </style>
</head>
<body class="pb-40">

    <header class="vibrant-gradient text-white p-10 text-center rounded-b-[4rem] shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <div class="inline-block legacy-gold px-4 py-1 rounded-full text-[10px] font-bold mb-3 shadow-lg uppercase tracking-widest">
                🏆 Serving Taste with Legacy Since 2001
            </div>
            <h1 class="text-5xl hindi-font mb-2 tracking-wide">जगदीश चाट भंडार</h1>
            <p class="text-orange-100 italic text-lg">"25 saal ka vishwas, wahi purana swad!"</p>
        </div>
    </header>

    <section class="max-w-md mx-auto px-5 mt-[-25px] relative z-20">
        <div class="bg-slate-900 text-white p-5 rounded-[2.5rem] shadow-2xl border-4 border-yellow-400">
            <div class="flex items-center gap-4">
                <div class="bg-yellow-400 text-slate-900 w-12 h-12 rounded-2xl flex items-center justify-center text-2xl floating">🍱</div>
                <div class="flex-1">
                    <p class="text-yellow-400 text-[10px] font-bold uppercase">Family Super Combo</p>
                    <h3 class="font-bold text-lg leading-tight">24 Gol Gappe + 2 Dahi Bhalla</h3>
                </div>
                <div class="text-right">
                    <p class="text-xs line-through opacity-50">₹280</p>
                    <p class="text-xl font-black text-yellow-400">₹249</p>
                </div>
            </div>
            <button onclick="addToCart('Family Combo (24G+2DB)', 249)" class="w-full mt-4 bg-yellow-400 text-slate-900 py-3 rounded-xl font-black text-sm active:scale-95 transition-all">COMBO ADD KAREIN +</button>
        </div>
    </section>

    <main class="max-w-md mx-auto p-5 mt-6 space-y-8">
        <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-orange-50 animate__animated animate__fadeInUp">
            <img src="./golgappe.jpg" class="w-full h-44 object-cover" alt="Gol Gappe">
            <div class="p-6 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold">Gol Gappe (6 Pcs)</h3>
                    <p class="text-orange-600 font-black text-xl">₹40</p>
                </div>
                <button onclick="openCustomizer('Gol Gappe', 40)" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold">Add +</button>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-orange-50 animate__animated animate__fadeInUp" style="animation-delay: 0.1s">
            <img src="./dahibhalla.jpg" class="w-full h-44 object-cover" alt="Dahi Bhalla">
            <div class="p-6 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold">Dahi Bhalla Spl</h3>
                    <p class="text-orange-600 font-black text-xl">₹60</p>
                </div>
                <button onclick="addToCart('Dahi Bhalla', 60)" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold">Add +</button>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-orange-50 animate__animated animate__fadeInUp" style="animation-delay: 0.2s">
            <img src="./papdichaat.jpg" class="w-full h-44 object-cover" alt="Papdi Chaat">
            <div class="p-6 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold">Papdi Chaat</h3>
                    <p class="text-orange-600 font-black text-xl">₹50</p>
                </div>
                <button onclick="addToCart('Papdi Chaat', 50)" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold">Add +</button>
            </div>
        </div>
    </main>

    <div id="paymentModal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-xl hidden z-[200] items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3.5rem] p-10 text-center animate__animated animate__zoomIn">
            <div class="text-5xl mb-4 floating">🤤</div>
            <h3 class="text-2xl font-bold mb-1">Final Bill</h3>
            <p id="payAmountText" class="text-5xl font-black text-slate-900 mb-6 tracking-tighter">₹0</p>
            <div class="flex justify-center p-4 bg-orange-50 rounded-[2.5rem] mb-6 border-2 border-dashed border-orange-200">
                <div id="qrcode"></div>
            </div>
            <p class="hindi-font text-orange-600 text-xl font-bold mb-6">"Cravings ko kar do order!"</p>
            <div class="space-y-4">
                <button onclick="openUPI()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-bold text-lg shadow-xl">Pay Now 🚀</button>
                <button onclick="confirmAndWhatsApp()" class="w-full bg-green-500 text-white py-5 rounded-[2rem] font-bold text-lg flex items-center justify-center gap-2 shadow-lg">
                    <i class="fa-brands fa-whatsapp"></i> Confirm on WhatsApp
                </button>
            </div>
            <button onclick="closePayment()" class="mt-4 text-slate-400 text-xs font-bold uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <div id="cartBar" class="fixed bottom-8 left-6 right-6 hidden z-[50]">
        <div class="max-w-md mx-auto vibrant-gradient text-white p-6 rounded-[2.5rem] shadow-2xl flex items-center justify-between border-4 border-white/20">
            <div>
                <p id="itemCount" class="text-[10px] font-bold uppercase tracking-widest">Items Added</p>
                <h4 id="totalPrice" class="text-3xl font-black">₹0</h4>
            </div>
            <button onclick="handlePayment()" class="bg-white text-orange-600 px-8 py-4 rounded-2xl font-black shadow-xl">CHECKOUT 🛍️</button>
        </div>
    </div>

    <script>
        let cart = []; let total = 0; let currentItem = null;
        const myUPI = "Q083101167@ybl"; const myWhatsApp = "917683022663"; const myName = "Jagdish Chaat Bhandaar";

        function addToCart(name, price) {
            cart.push({ name, price }); total += price;
            document.getElementById('cartBar').classList.remove('hidden');
            document.getElementById('itemCount').innerText = `${cart.length} Dishes Added`;
            document.getElementById('totalPrice').innerText = `₹${total}`;
        }

        function handlePayment() {
            const address = prompt("Address aur Landmark:");
            if(!address) return;
            window.userAddress = address;
            const upiUrl = `upi://pay?pa=${myUPI}&pn=${encodeURIComponent(myName)}&am=${total}&cu=INR`;
            window.currentUpiUrl = upiUrl;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: upiUrl, width: 140, height: 140 });
            document.getElementById('payAmountText').innerText = `₹${total}`;
            document.getElementById('paymentModal').classList.add('modal-active');
        }

        function openUPI() { window.location.href = window.currentUpiUrl; }

        function confirmAndWhatsApp() {
            const itemsStr = cart.map(i => i.name).join(", ");
            const msg = `*🔥 NEW ORDER - JCB*%0A%0A*Items:* ${itemsStr}%0A*Total:* ₹${total}%0A*Address:* ${window.userAddress}`;
            window.location.href = `https://wa.me/${myWhatsApp}?text=${msg}`;
        }

        function closePayment() { document.getElementById('paymentModal').classList.remove('modal-active'); }
    </script>
</body>
</html>
